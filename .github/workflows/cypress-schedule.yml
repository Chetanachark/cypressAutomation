name: Cypress Scheduled Run

on:
  schedule:
    - cron: '15 12 * * *'
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.16.0

      - name: Install Dependencies
        run: npm ci

      - name: Run Cypress Tests (Record to Dashboard)
        run: |
          npx cypress run \
          --record \
          --key ${{ secrets.CYPRESS_RECORD_KEY }}

      - name: Merge Mochawesome JSON Reports
        if: always()
        run: |
          npx mochawesome-merge cypress/reports/*.json -o merged.json

      - name: Generate Final HTML Report
        if: always()
        run: |
          npx marge merged.json \
          --reportDir cypress/reports \
          --reportFilename final-report

      - name: Upload HTML Report as Artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: cypress-html-report
          path: cypress/reports/final-report.html