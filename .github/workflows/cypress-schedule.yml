name: Cypress Scheduled Run

on:
  schedule:
    - cron: '15 12 * * *'   # 5:45 PM IST (12:15 UTC)
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.16.0

      - name: Install Dependencies
        run: npm ci

      - name: Run Cypress Tests (Record + Mochawesome)
        run: |
          npx cypress run \
            --record \
            --key ${{ secrets.CYPRESS_RECORD_KEY }} \
            --reporter mochawesome \
            --reporter-options reportDir=cypress/reports,overwrite=false,html=false,json=true
          - name: Debug - List Report Files
          
           run: |
           echo "Listing report directory"
            ls -R cypress


      - name: Merge Mochawesome JSON Reports
        run: npx mochawesome-merge cypress/reports/*.json -o merged.json

      - name: Generate Final HTML Report
        run: npx marge merged.json --reportDir cypress/reports --reportFilename final-report

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-html-report
          path: cypress/reports/final-report.html