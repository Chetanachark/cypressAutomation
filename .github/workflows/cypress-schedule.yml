name: Cypress Scheduled Run

on:
  schedule:
    - cron: '15 12 * * *'  # runs daily at 5:45 PM IST
  workflow_dispatch:       # optional manual run

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.16.0]   # Node version(s)
        runner: [1, 2, 3, 4]          # 3 parallel runners (adjust as needed)
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        run: npm ci

      - name: Run Cypress Tests in Parallel
        run: npx cypress run --record --key ${{ secrets.CYPRESS_RECORD_KEY }} --parallel --ci-build-id ${{ github.run_id }}